name: Flatpak CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      appcenter-validation:
        description: Verify public AppCenter screenshot URLs
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: flatpak-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/elementary/flatpak-platform/runtime:8
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Validate release metadata
        run: python3 scripts/validate-release.py

      - name: Validate AppCenter publication metadata
        if: ${{ inputs.appcenter-validation }}
        run: python3 scripts/validate-release.py --appcenter

      - name: Build and test Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.github.hugmouse.valapad.flatpak
          manifest-path: com.github.hugmouse.valapad.yml
          run-tests: true
          repository-name: appcenter
          repository-url: https://flatpak.elementary.io/repo.flatpakrepo
          cache-key: flatpak-builder-${{ runner.os }}-${{ github.ref_name }}
