id: com.github.hugmouse.valapad
runtime: io.elementary.Platform
runtime-version: '8'
sdk: io.elementary.Sdk
command: com.github.hugmouse.valapad

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

modules:
  - name: com.github.hugmouse.valapad
    buildsystem: meson
    sources:
      - type: dir
        path: .
